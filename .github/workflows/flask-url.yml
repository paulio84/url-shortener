name: UrlMe CI/CD

on:
    push:
        branches:
            - main
        paths:
            - "flask-url/**"
    pull_request:
        branches:
            - main
        paths:
            - "flask-url/**"
jobs:
    test:
        name: Run Tests
        runs-on: ubuntu-latest

        services:
            db:
                image: postgres:16-alpine
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: urlme_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 5s
                    --health-timeout 5s
                    --health-retries 5

        defaults:
            run:
                working-directory: flask-url

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Install uv
              uses: astral-sh/setup-uv@v7
              with:
                  version: "latest"

            - name: Set up Python
              run: uv sync --frozen

            - name: Run tests
              env:
                  FLASK_ENV: testing
                  SECRET_KEY: ci-secret-key-for-testing-flask-url
                  JWT_SECRET_KEY: ci-jwt-secret-key-for-testing-flask-url
                  TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/urlme_test
              run: uv run pytest -v

    deploy:
        name: Deploy to Fly.io
        runs-on: ubuntu-latest
        needs: test
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'

        defaults:
            run:
                working-directory: flask-url

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Install Fly CLI
              uses: superfly/flyctl-actions/setup-flyctl@master

            - name: Deploy to Fly.io
              env:
                  FLY_API_TOKEN: ${{secrets.FLY_API_TOKEN}}
              run: flyctl deploy --remote-only
